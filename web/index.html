<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura 监控面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { slate: { 950: '#0f172a' } }
        }
      }
    }
  </script>
  <style>
    .pulse-green { box-shadow: 0 0 8px #22c55e; }
    .pulse-red   { box-shadow: 0 0 8px #ef4444; }
    .bar-track { background: #1e293b; border-radius: 9999px; height: 6px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 9999px; transition: width 0.4s; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const API = '/api';

    // 格式化网络速率
    function fmtBytes(bps) {
      if (bps == null || isNaN(bps)) return '-';
      if (bps >= 1024 * 1024) return (bps / 1024 / 1024).toFixed(1) + ' MB/s';
      if (bps >= 1024) return (bps / 1024).toFixed(1) + ' KB/s';
      return bps.toFixed(0) + ' B/s';
    }

    // 格式化运行时间
    function fmtUptime(seconds) {
      if (!seconds) return '-';
      const d = Math.floor(seconds / 86400);
      const h = Math.floor((seconds % 86400) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (d > 0) return `${d}天${h}时`;
      if (h > 0) return `${h}时${m}分`;
      return `${m}分`;
    }

    // 格式化内存总量
    function fmtMem(bytes) {
      if (!bytes) return '-';
      if (bytes >= 1024 ** 3) return (bytes / 1024 ** 3).toFixed(1) + ' GB';
      if (bytes >= 1024 ** 2) return (bytes / 1024 ** 2).toFixed(1) + ' MB';
      return (bytes / 1024).toFixed(1) + ' KB';
    }

    // 进度条颜色
    function barColor(pct) {
      if (pct >= 80) return '#ef4444';
      if (pct >= 60) return '#f59e0b';
      return '#22c55e';
    }

    function StatusDot({ status, size = 'sm' }) {
      const sz = size === 'sm' ? 'w-2 h-2' : 'w-3 h-3';
      return (
        <span className={`inline-block rounded-full flex-shrink-0 ${sz} ${
          status === 'up' ? 'bg-green-500 pulse-green' : 'bg-red-500 pulse-red'
        }`} />
      );
    }

    function Bar({ value }) {
      const pct = Math.min(100, Math.max(0, value || 0));
      return (
        <div className="bar-track w-full">
          <div className="bar-fill" style={{ width: pct + '%', background: barColor(pct) }} />
        </div>
      );
    }

    function StatCard({ label, value, color = 'text-slate-100' }) {
      return (
        <div className="bg-slate-800 rounded-lg px-4 py-3 flex flex-col gap-1">
          <span className="text-xs text-slate-400">{label}</span>
          <span className={`text-2xl font-bold ${color}`}>{value}</span>
        </div>
      );
    }

    function AlertsPanel({ alerts }) {
      if (!alerts || alerts.length === 0) return null;
      return (
        <section>
          <h2 className="text-sm font-semibold mb-2 text-red-400 uppercase tracking-wide">告警</h2>
          <div className="space-y-2">
            {alerts.map((a, i) => (
              <div key={i} className="flex items-center gap-3 p-3 bg-red-500/10 border-l-4 border-red-500 rounded">
                <span className="text-xs font-bold bg-red-500 text-white px-2 py-0.5 rounded-full">DOWN</span>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold truncate">{a.name}</div>
                  <div className="text-xs text-slate-400 truncate">{a.target}</div>
                </div>
                <div className="text-xs text-red-400 flex-shrink-0">{a.duration}</div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function NodeTable({ nodes, onSelect }) {
      if (!nodes) return <div className="text-slate-500 text-center py-8">加载中...</div>;
      if (nodes.length === 0) return <div className="text-slate-500 text-center py-8">暂无 Node 数据（请检查 Prometheus 连接）</div>;
      return (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-xs text-slate-400 border-b border-slate-700">
                <th className="text-left py-2 pr-4 font-medium">实例</th>
                <th className="text-center py-2 px-2 font-medium">状态</th>
                <th className="text-left py-2 px-2 font-medium w-32">CPU</th>
                <th className="text-left py-2 px-2 font-medium w-32">内存</th>
                <th className="text-left py-2 px-2 font-medium w-32">磁盘</th>
                <th className="text-right py-2 px-2 font-medium">网络 ↑</th>
                <th className="text-right py-2 px-2 font-medium">网络 ↓</th>
                <th className="text-right py-2 px-2 font-medium">负载</th>
                <th className="text-right py-2 pl-2 font-medium">运行时间</th>
              </tr>
            </thead>
            <tbody>
              {nodes.map((n, i) => (
                <tr key={i} className="border-b border-slate-800 hover:bg-slate-800/50 transition-colors cursor-pointer" onClick={() => onSelect(n)}>
                  <td className="py-3 pr-4 font-mono text-xs text-slate-300 truncate max-w-[160px]" title={n.instance}>
                    {n.name || n.instance}
                  </td>
                  <td className="py-3 px-2 text-center">
                    <StatusDot status={n.status} />
                  </td>
                  <td className="py-3 px-2">
                    <div className="flex items-center gap-2">
                      <Bar value={n.cpu} />
                      <span className="text-xs w-10 text-right flex-shrink-0" style={{ color: barColor(n.cpu) }}>
                        {(n.cpu || 0).toFixed(1)}%
                      </span>
                    </div>
                  </td>
                  <td className="py-3 px-2">
                    <div className="flex items-center gap-2">
                      <Bar value={n.memUsed} />
                      <span className="text-xs w-10 text-right flex-shrink-0" style={{ color: barColor(n.memUsed) }}>
                        {(n.memUsed || 0).toFixed(1)}%
                      </span>
                    </div>
                  </td>
                  <td className="py-3 px-2">
                    <div className="flex items-center gap-2">
                      <Bar value={n.disk} />
                      <span className="text-xs w-10 text-right flex-shrink-0" style={{ color: barColor(n.disk) }}>
                        {(n.disk || 0).toFixed(1)}%
                      </span>
                    </div>
                  </td>
                  <td className="py-3 px-2 text-right text-xs text-slate-300 whitespace-nowrap">{fmtBytes(n.netOut)}</td>
                  <td className="py-3 px-2 text-right text-xs text-slate-300 whitespace-nowrap">{fmtBytes(n.netIn)}</td>
                  <td className="py-3 px-2 text-right text-xs text-slate-300">{(n.load1 || 0).toFixed(2)}</td>
                  <td className="py-3 pl-2 text-right text-xs text-slate-300 whitespace-nowrap">{fmtUptime(n.uptime)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function HttpProbeList({ probes, onSelect }) {
      if (!probes || probes.length === 0) return null;
      return (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
          {probes.map((p, i) => (
            <div key={i} onClick={() => onSelect(p)} className={`bg-slate-800 rounded-lg p-3 flex items-center gap-3 cursor-pointer hover:bg-slate-700/80 transition-colors ${
              p.status === 'down' ? 'border border-red-500/50' : ''
            }`}>
              <StatusDot status={p.status} />
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium truncate">{p.name}</div>
                <div className="text-xs text-slate-400 truncate">{p.instance}</div>
              </div>
              <span className={`text-xs font-bold flex-shrink-0 ${
                p.status === 'up' ? 'text-green-400' : 'text-red-400'
              }`}>{p.status.toUpperCase()}</span>
            </div>
          ))}
        </div>
      );
    }

    function TrendChart({ hours, instance }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        async function load() {
          try {
            const target = instance ? `up{instance="${instance}"}` : 'up';
            const res = await fetch(`${API}/trend?hours=${hours}&target=${encodeURIComponent(target)}`);
            const result = await res.json();
            const step = 5 * 60 * 1000;
            const totalPoints = Math.ceil(hours * 60 / 5);
            const timeMap = new Map();

            result.data.forEach(series => {
              series.data.forEach(point => {
                const key = Math.floor(point.timestamp / 300) * 300;
                if (!timeMap.has(key)) timeMap.set(key, { up: 0, total: 0 });
                const s = timeMap.get(key);
                s.total++;
                if (point.value === 1) s.up++;
              });
            });

            const labels = [], data = [];
            const now = Date.now();
            for (let i = totalPoints - 1; i >= 0; i--) {
              const ts = now - i * step;
              const key = Math.floor(ts / 1000 / 300) * 300;
              const s = timeMap.get(key);
              labels.push(new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }));
              data.push(s ? (s.up / s.total * 100) : null);
            }

            if (chartRef.current) chartRef.current.destroy();
            chartRef.current = new Chart(canvasRef.current, {
              type: 'line',
              data: {
                labels,
                datasets: [{
                  label: '可用性 (%)',
                  data,
                  borderColor: '#22c55e',
                  backgroundColor: 'rgba(34,197,94,0.1)',
                  fill: true,
                  tension: 0.3,
                  pointRadius: 0,
                  pointHoverRadius: 5
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
                scales: {
                  x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', maxTicksLimit: 10 } },
                  y: { min: 0, max: 100, grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: v => v + '%' } }
                },
                interaction: { intersect: false, mode: 'index' }
              }
            });
          } catch (e) { console.error('加载趋势失败:', e); }
        }
        load();
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [hours]);

      return <canvas ref={canvasRef} />;
    }

    function TrendModal({ item, onClose }) {
      const [hours, setHours] = useState(1);
      const HOURS = [{ label: '1小时', v: 1 }, { label: '6小时', v: 6 }, { label: '24小时', v: 24 }, { label: '7天', v: 168 }];
      const isNode = item.cpu !== undefined;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60" onClick={onClose}>
          <div className="bg-slate-900 border border-slate-700 rounded-xl p-6 w-full max-w-2xl mx-4" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <div>
                <div className="font-semibold text-slate-100">{item.name || item.instance}</div>
                <div className="text-xs text-slate-400 mt-0.5">{item.instance}</div>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none px-1">×</button>
            </div>
            {isNode && (
              <div className="grid grid-cols-3 gap-3 mb-4">
                <div className="bg-slate-800 rounded-lg px-3 py-2">
                  <div className="text-xs text-slate-400 mb-0.5">CPU 核心</div>
                  <div className="text-sm font-semibold text-slate-100">{item.cpuCores ? `${item.cpuCores} 核` : '-'}</div>
                </div>
                <div className="bg-slate-800 rounded-lg px-3 py-2">
                  <div className="text-xs text-slate-400 mb-0.5">内存</div>
                  <div className="text-sm font-semibold text-slate-100">
                    {item.memUsedBytes && item.memTotal ? `${fmtMem(item.memUsedBytes)} / ${fmtMem(item.memTotal)}` : '-'}
                  </div>
                </div>
                <div className="bg-slate-800 rounded-lg px-3 py-2">
                  <div className="text-xs text-slate-400 mb-0.5">磁盘 (/)</div>
                  <div className="text-sm font-semibold text-slate-100">
                    {item.diskUsed && item.diskTotal ? `${fmtMem(item.diskUsed)} / ${fmtMem(item.diskTotal)}` : '-'}
                  </div>
                </div>
              </div>
            )}
            <div className="flex gap-2 mb-4 flex-wrap">
              {HOURS.map(h => (
                <button key={h.v} onClick={() => setHours(h.v)}
                  className={`px-3 py-1 rounded text-xs border transition-colors ${
                    hours === h.v ? 'bg-blue-600 border-blue-600 text-white' : 'border-slate-700 text-slate-400 hover:bg-slate-800'
                  }`}>
                  {h.label}
                </button>
              ))}
            </div>
            <div className="h-64">
              <TrendChart hours={hours} instance={item.instance} />
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [probes, setProbes] = useState(null);
      const [alerts, setAlerts] = useState(null);
      const [nodes, setNodes] = useState(null);
      const [selectedItem, setSelectedItem] = useState(null);
      const [updateTime, setUpdateTime] = useState('-');

      useEffect(() => {
        const es = new EventSource(`${API}/stream`);
        es.onmessage = (e) => {
          try {
            const d = JSON.parse(e.data);
            setProbes(d.probes || []);
            setAlerts(d.alerts || []);
            setNodes(d.nodes || []);
            setUpdateTime(new Date().toLocaleTimeString('zh-CN'));
          } catch (err) { console.error('SSE 解析失败:', err); }
        };
        es.onerror = () => console.warn('SSE 连接断开，浏览器将自动重连');
        return () => es.close();
      }, []);

      const allProbes = probes || [];
      const httpProbes = allProbes.filter(p => p.type === 'blackbox');
      const nodeProbes = allProbes.filter(p => p.type === 'node');
      const upCount = allProbes.filter(p => p.status === 'up').length;
      const downCount = allProbes.filter(p => p.status === 'down').length;

      return (
        <>
          {selectedItem && <TrendModal item={selectedItem} onClose={() => setSelectedItem(null)} />}
          <header className="bg-slate-900 border-b border-slate-800 px-6 py-3 flex flex-wrap gap-4 items-center justify-between sticky top-0 z-10">
            <h1 className="text-lg font-bold tracking-tight">Aura 监控</h1>
            <div className="flex items-center gap-5 text-sm">
              <span className="flex items-center gap-1.5">
                <StatusDot status="up" size="md" />
                <span className="text-green-400 font-semibold">{upCount}</span>
                <span className="text-slate-400">UP</span>
              </span>
              <span className="flex items-center gap-1.5">
                <StatusDot status="down" size="md" />
                <span className={downCount > 0 ? 'text-red-400 font-semibold' : 'text-slate-400'}>{downCount}</span>
                <span className="text-slate-400">DOWN</span>
              </span>
              <span className="text-slate-500 text-xs">更新于 {updateTime}</span>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-5 space-y-6">

            {/* 统计卡片 */}
            <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
              <StatCard label="总探针" value={allProbes.length} />
              <StatCard label="在线" value={upCount} color="text-green-400" />
              <StatCard label="离线" value={downCount} color={downCount > 0 ? 'text-red-400' : 'text-slate-100'} />
              <StatCard label="HTTP 探针" value={httpProbes.length} color="text-violet-400" />
              <StatCard label="Node 探针" value={nodeProbes.length} color="text-blue-400" />
            </div>

            {/* 告警区域 */}
            {alerts && alerts.length > 0 && <AlertsPanel alerts={alerts} />}

            {/* Node 服务器表格 */}
            <section>
              <h2 className="text-sm font-semibold mb-3 text-slate-300 uppercase tracking-wide">
                服务器节点
                {nodes && <span className="ml-2 text-slate-500 font-normal normal-case">({nodes.length} 台)</span>}
              </h2>
              <div className="bg-slate-900 border border-slate-800 rounded-lg p-4">
                <NodeTable nodes={nodes} onSelect={setSelectedItem} />
              </div>
            </section>

            {/* HTTP 探针 */}
            {httpProbes.length > 0 && (
              <section>
                <h2 className="text-sm font-semibold mb-3 text-slate-300 uppercase tracking-wide">
                  HTTP 探针
                  <span className="ml-2 text-slate-500 font-normal normal-case">({httpProbes.length} 个)</span>
                </h2>
                <HttpProbeList probes={httpProbes} onSelect={setSelectedItem} />
              </section>
            )}

          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
