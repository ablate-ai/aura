<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura 监控面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: { 950: '#0f172a' }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes pulse-glow-green {
      0%, 100% { box-shadow: 0 0 4px 1px rgba(34,197,94,0.6); }
      50% { box-shadow: 0 0 10px 3px rgba(34,197,94,0.9); }
    }
    @keyframes pulse-glow-red {
      0%, 100% { box-shadow: 0 0 4px 1px rgba(239,68,68,0.6); }
      50% { box-shadow: 0 0 10px 3px rgba(239,68,68,0.9); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .pulse-green { animation: pulse-glow-green 2s ease-in-out infinite; }
    .pulse-red   { animation: pulse-glow-red 2s ease-in-out infinite; }
    .fade-in     { animation: fadeIn 0.3s ease-out both; }
    .slide-up    { animation: slideUp 0.25s ease-out both; }
    .bar-track   { background: #1e293b; border-radius: 9999px; height: 5px; overflow: hidden; }
    .bar-fill    { height: 100%; border-radius: 9999px; transition: width 0.5s ease; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    .node-row { transition: background 0.15s ease; }
    .node-row:hover { background: rgba(51,65,85,0.5); }
    .stat-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .probe-card { transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease; }
    .probe-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div id="root"></div>


  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    const API = '/api';

    // 格式化网络速率
    function fmtBytes(bps) {
      if (bps == null || isNaN(bps)) return '-';
      if (bps >= 1024 * 1024) return (bps / 1024 / 1024).toFixed(1) + ' MB/s';
      if (bps >= 1024) return (bps / 1024).toFixed(1) + ' KB/s';
      return bps.toFixed(0) + ' B/s';
    }

    // 格式化运行时间
    function fmtUptime(seconds) {
      if (!seconds) return '-';
      const d = Math.floor(seconds / 86400);
      const h = Math.floor((seconds % 86400) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (d > 0) return `${d}天${h}时`;
      if (h > 0) return `${h}时${m}分`;
      return `${m}分`;
    }

    // 格式化内存/磁盘大小
    function fmtMem(bytes) {
      if (!bytes) return '-';
      if (bytes >= 1024 ** 3) return (bytes / 1024 ** 3).toFixed(1) + ' GB';
      if (bytes >= 1024 ** 2) return (bytes / 1024 ** 2).toFixed(1) + ' MB';
      return (bytes / 1024).toFixed(1) + ' KB';
    }

    // 进度条颜色
    function barColor(pct) {
      if (pct >= 80) return '#ef4444';
      if (pct >= 60) return '#f59e0b';
      return '#22c55e';
    }

    // 状态 Badge
    function StatusBadge({ status }) {
      const isUp = status === 'up';
      return (
        <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold tracking-wide ${
          isUp ? 'bg-green-500/15 text-green-400 border border-green-500/30'
               : 'bg-red-500/15 text-red-400 border border-red-500/30'
        }`}>
          <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${isUp ? 'bg-green-400 pulse-green' : 'bg-red-400 pulse-red'}`} />
          {isUp ? 'UP' : 'DOWN'}
        </span>
      );
    }

    // 进度条组件
    function Bar({ value }) {
      const pct = Math.min(100, Math.max(0, value || 0));
      return (
        <div className="bar-track w-full">
          <div className="bar-fill" style={{ width: pct + '%', background: barColor(pct) }} />
        </div>
      );
    }

    // 统计卡片（带图标）
    function StatCard({ label, value, color, icon, sub }) {
      return (
        <div className="stat-card bg-slate-900 border border-slate-800 rounded-xl px-5 py-4 flex items-center gap-4 cursor-default">
          <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-xl flex-shrink-0 ${color.bg}`}>
            {icon}
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-xs text-slate-500 mb-0.5">{label}</div>
            <div className={`text-2xl font-bold leading-none ${color.text}`}>{value}</div>
            {sub && <div className="text-xs text-slate-500 mt-1">{sub}</div>}
          </div>
        </div>
      );
    }

    // 告警面板
    function AlertsPanel({ alerts }) {
      if (!alerts || alerts.length === 0) return null;
      return (
        <section className="fade-in">
          <div className="rounded-xl overflow-hidden border border-red-500/30"
               style={{ background: 'linear-gradient(135deg, rgba(239,68,68,0.08) 0%, rgba(185,28,28,0.05) 100%)' }}>
            <div className="flex items-center gap-2 px-4 py-3 border-b border-red-500/20">
              <span className="text-base">🚨</span>
              <span className="text-sm font-bold text-red-400 uppercase tracking-wider">告警</span>
              <span className="ml-auto bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">{alerts.length}</span>
            </div>
            <div className="divide-y divide-red-500/10">
              {alerts.map((a, i) => (
                <div key={i} className="flex items-center gap-3 px-4 py-3 hover:bg-red-500/5 transition-colors">
                  <span className="w-2 h-2 rounded-full bg-red-400 pulse-red flex-shrink-0" />
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-slate-100 truncate">{a.name}</div>
                    <div className="text-xs text-slate-400 truncate mt-0.5">{a.target}</div>
                  </div>
                  <div className="text-xs text-red-400 flex-shrink-0 font-mono">{a.duration}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // 节点表格
    function NodeTable({ nodes, onSelect }) {
      if (!nodes) return (
        <div className="flex items-center justify-center py-12 text-slate-500 gap-2">
          <span className="w-4 h-4 border-2 border-slate-600 border-t-blue-400 rounded-full animate-spin" />
          加载中...
        </div>
      );
      if (nodes.length === 0) return (
        <div className="text-slate-500 text-center py-12 text-sm">暂无 Node 数据（请检查 Prometheus 连接）</div>
      );
      return (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-xs text-slate-500 border-b border-slate-800">
                <th className="text-left py-2.5 pr-4 font-medium pl-2">实例</th>
                <th className="text-center py-2.5 px-3 font-medium">状态</th>
                <th className="text-left py-2.5 px-3 font-medium w-36">CPU</th>
                <th className="text-left py-2.5 px-3 font-medium w-44">内存</th>
                <th className="text-left py-2.5 px-3 font-medium w-44">磁盘</th>
                <th className="text-right py-2.5 px-3 font-medium">上行</th>
                <th className="text-right py-2.5 px-3 font-medium">下行</th>
                <th className="text-right py-2.5 px-3 font-medium">负载</th>
                <th className="text-right py-2.5 pl-3 pr-2 font-medium">运行时间</th>
              </tr>
            </thead>
            <tbody>
              {nodes.map((n, i) => {
                const memPct = n.memUsed || 0;
                const diskPct = n.disk || 0;
                const memLabel = (n.memUsedBytes && n.memTotal)
                  ? `${memPct.toFixed(0)}% · ${fmtMem(n.memUsedBytes)}/${fmtMem(n.memTotal)}`
                  : `${memPct.toFixed(1)}%`;
                const diskLabel = (n.diskUsed && n.diskTotal)
                  ? `${diskPct.toFixed(0)}% · ${fmtMem(n.diskUsed)}/${fmtMem(n.diskTotal)}`
                  : `${diskPct.toFixed(1)}%`;
                return (
                  <tr key={i} className="node-row border-b border-slate-800/60 cursor-pointer" onClick={() => onSelect(n)}>
                    <td className="py-3 pr-4 pl-2">
                      <div className="font-medium text-slate-200 truncate max-w-[150px]">
                        {n.name || n.instance}
                      </div>
                    </td>
                    <td className="py-3 px-3 text-center">
                      <StatusBadge status={n.status} />
                    </td>
                    <td className="py-3 px-3">
                      <div className="flex items-center gap-2">
                        <Bar value={n.cpu} />
                        <span className="text-xs w-12 text-right flex-shrink-0 font-mono" style={{ color: barColor(n.cpu) }}>
                          {(n.cpu || 0).toFixed(1)}%
                        </span>
                      </div>
                    </td>
                    <td className="py-3 px-3">
                      <div className="flex items-center gap-2">
                        <Bar value={memPct} />
                        <span className="text-xs flex-shrink-0 font-mono whitespace-nowrap" style={{ color: barColor(memPct) }}>
                          {memLabel}
                        </span>
                      </div>
                    </td>
                    <td className="py-3 px-3">
                      <div className="flex items-center gap-2">
                        <Bar value={diskPct} />
                        <span className="text-xs flex-shrink-0 font-mono whitespace-nowrap" style={{ color: barColor(diskPct) }}>
                          {diskLabel}
                        </span>
                      </div>
                    </td>
                    <td className="py-3 px-3 text-right text-xs text-slate-300 font-mono whitespace-nowrap">{fmtBytes(n.netOut)}</td>
                    <td className="py-3 px-3 text-right text-xs text-slate-300 font-mono whitespace-nowrap">{fmtBytes(n.netIn)}</td>
                    <td className="py-3 px-3 text-right text-xs text-slate-300 font-mono">{(n.load1 || 0).toFixed(2)}</td>
                    <td className="py-3 pl-3 pr-2 text-right text-xs text-slate-400 whitespace-nowrap">{fmtUptime(n.uptime)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    // HTTP 探针卡片列表
    function HttpProbeList({ probes, onSelect }) {
      if (!probes || probes.length === 0) return null;
      return (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
          {probes.map((p, i) => {
            const isUp = p.status === 'up';
            return (
              <div key={i} onClick={() => onSelect(p)}
                className={`probe-card rounded-xl p-4 cursor-pointer border ${
                  isUp
                    ? 'bg-slate-900 border-slate-800 hover:border-slate-700'
                    : 'bg-red-950/20 border-red-500/30 hover:border-red-500/50'
                }`}>
                <div className="flex items-start justify-between gap-2 mb-3">
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-semibold text-slate-100 truncate">{p.name}</div>
                    <div className="text-xs text-slate-500 truncate mt-0.5">{p.instance}</div>
                  </div>
                  <StatusBadge status={p.status} />
                </div>
                <div className={`text-xs font-mono px-2 py-1 rounded ${
                  isUp ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'
                }`}>
                  {isUp ? '● 正常响应' : '● 无法访问'}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // 趋势图表
    function TrendChart({ hours, instance }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        async function load() {
          try {
            const target = instance ? `up{instance="${instance}"}` : 'up';
            const res = await fetch(`${API}/trend?hours=${hours}&target=${encodeURIComponent(target)}`);
            const result = await res.json();
            const step = 5 * 60 * 1000;
            const totalPoints = Math.ceil(hours * 60 / 5);
            const timeMap = new Map();

            result.data.forEach(series => {
              series.data.forEach(point => {
                const key = Math.floor(point.timestamp / 300) * 300;
                if (!timeMap.has(key)) timeMap.set(key, { up: 0, total: 0 });
                const s = timeMap.get(key);
                s.total++;
                if (point.value === 1) s.up++;
              });
            });

            const labels = [], data = [];
            const now = Date.now();
            for (let i = totalPoints - 1; i >= 0; i--) {
              const ts = now - i * step;
              const key = Math.floor(ts / 1000 / 300) * 300;
              const s = timeMap.get(key);
              const fmt = hours <= 24
                ? new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
                : new Date(ts).toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
              labels.push(fmt);
              data.push(s ? (s.up / s.total * 100) : null);
            }

            if (chartRef.current) chartRef.current.destroy();
            chartRef.current = new Chart(canvasRef.current, {
              type: 'line',
              data: {
                labels,
                datasets: [{
                  label: '可用性 (%)',
                  data,
                  borderColor: '#22c55e',
                  backgroundColor: 'rgba(34,197,94,0.08)',
                  fill: true,
                  tension: 0.4,
                  pointRadius: 0,
                  pointHoverRadius: 4,
                  borderWidth: 2,
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    mode: 'index',
                    intersect: false,
                    backgroundColor: '#1e293b',
                    borderColor: '#334155',
                    borderWidth: 1,
                    titleColor: '#94a3b8',
                    bodyColor: '#e2e8f0',
                    callbacks: { label: ctx => ` ${ctx.parsed.y != null ? ctx.parsed.y.toFixed(1) : 'N/A'}%` }
                  }
                },
                scales: {
                  x: {
                    grid: { color: 'rgba(51,65,85,0.5)' },
                    ticks: { color: '#64748b', maxTicksLimit: 8, font: { size: 11 } }
                  },
                  y: {
                    min: 0, max: 100,
                    grid: { color: 'rgba(51,65,85,0.5)' },
                    ticks: { color: '#64748b', callback: v => v + '%', font: { size: 11 } }
                  }
                },
                interaction: { intersect: false, mode: 'index' }
              }
            });
          } catch (e) { console.error('加载趋势失败:', e); }
        }
        load();
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [hours, instance]);

      return <canvas ref={canvasRef} />;
    }

    // 趋势弹窗
    function TrendModal({ item, onClose }) {
      const [hours, setHours] = useState(1);
      const HOURS = [{ label: '1h', v: 1 }, { label: '6h', v: 6 }, { label: '24h', v: 24 }, { label: '7d', v: 168 }];
      const isNode = item.cpu !== undefined;

      useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [onClose]);

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
             style={{ background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(4px)' }}
             onClick={onClose}>
          <div className="slide-up bg-slate-900 border border-slate-700/80 rounded-2xl w-full max-w-3xl shadow-2xl"
               onClick={e => e.stopPropagation()}>
            {/* 弹窗头部 */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-800">
              <div className="flex items-center gap-3">
                <div className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${item.status === 'up' ? 'bg-green-400 pulse-green' : 'bg-red-400 pulse-red'}`} />
                <div>
                  <div className="font-semibold text-slate-100 text-base">{item.name || item.instance}</div>
                </div>
              </div>
              <button onClick={onClose}
                className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-colors text-lg">
                ✕
              </button>
            </div>

            <div className="px-6 py-5 space-y-5">
              {/* 节点配置信息卡片 */}
              {isNode && (
                <div className="grid grid-cols-3 gap-3">
                  <div className="bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-3">
                    <div className="text-xs text-slate-500 mb-1">CPU 核心</div>
                    <div className="text-lg font-bold text-slate-100">{item.cpuCores ? `${item.cpuCores} 核` : '-'}</div>
                    <div className="text-xs text-slate-500 mt-1">当前 {(item.cpu || 0).toFixed(1)}% 使用率</div>
                  </div>
                  <div className="bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-3">
                    <div className="text-xs text-slate-500 mb-1">内存</div>
                    <div className="text-lg font-bold text-slate-100">
                      {item.memUsedBytes && item.memTotal ? fmtMem(item.memUsedBytes) : '-'}
                    </div>
                    <div className="text-xs text-slate-500 mt-1">
                      共 {item.memTotal ? fmtMem(item.memTotal) : '-'} · {(item.memUsed || 0).toFixed(1)}%
                    </div>
                  </div>
                  <div className="bg-slate-800/60 border border-slate-700/50 rounded-xl px-4 py-3">
                    <div className="text-xs text-slate-500 mb-1">磁盘 (/)</div>
                    <div className="text-lg font-bold text-slate-100">
                      {item.diskUsed ? fmtMem(item.diskUsed) : '-'}
                    </div>
                    <div className="text-xs text-slate-500 mt-1">
                      共 {item.diskTotal ? fmtMem(item.diskTotal) : '-'} · {(item.disk || 0).toFixed(1)}%
                    </div>
                  </div>
                </div>
              )}

              {/* 时间范围切换 */}
              <div className="flex items-center justify-between">
                <span className="text-xs text-slate-500 uppercase tracking-wider font-medium">可用性趋势</span>
                <div className="flex gap-1 bg-slate-800 rounded-lg p-1">
                  {HOURS.map(h => (
                    <button key={h.v} onClick={() => setHours(h.v)}
                      className={`px-3 py-1 rounded-md text-xs font-medium transition-all ${
                        hours === h.v
                          ? 'bg-blue-600 text-white shadow-sm'
                          : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700'
                      }`}>
                      {h.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* 图表区域 */}
              <div className="h-72 bg-slate-800/30 rounded-xl p-3">
                <TrendChart hours={hours} instance={item.instance} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    // 主应用
    function App() {
      const [probes, setProbes] = useState(null);
      const [alerts, setAlerts] = useState(null);
      const [nodes, setNodes] = useState(null);
      const [selectedItem, setSelectedItem] = useState(null);
      const [updateTime, setUpdateTime] = useState('-');
      const [connected, setConnected] = useState(false);

      useEffect(() => {
        let es;
        let retryTimer;

        function connect() {
          if (es) { es.close(); }
          es = new EventSource(`${API}/stream`);
          es.onopen = () => setConnected(true);
          es.onmessage = (e) => {
            try {
              const d = JSON.parse(e.data);
              setProbes(d.probes || []);
              setAlerts(d.alerts || []);
              setNodes(d.nodes || []);
              setUpdateTime(new Date().toLocaleTimeString('zh-CN'));
              setConnected(true);
            } catch (err) { console.error('SSE 解析失败:', err); }
          };
          es.onerror = () => {
            setConnected(false);
            es.close();
            retryTimer = setTimeout(connect, 3000);
          };
        }
        connect();
        return () => {
          clearTimeout(retryTimer);
          es && es.close();
        };
      }, []);

      const allProbes = probes || [];
      const httpProbes = allProbes.filter(p => p.type === 'blackbox');
      const nodeProbes = allProbes.filter(p => p.type === 'node');
      const upCount = allProbes.filter(p => p.status === 'up').length;
      const downCount = allProbes.filter(p => p.status === 'down').length;

      return (
        <>
          {selectedItem && <TrendModal item={selectedItem} onClose={() => setSelectedItem(null)} />}

          {/* Header */}
          <header className="bg-slate-900/80 border-b border-slate-800 px-6 py-3 flex flex-wrap gap-3 items-center justify-between sticky top-0 z-10"
                  style={{ backdropFilter: 'blur(12px)' }}>
            {/* Logo + 名称 */}
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center text-white font-bold text-sm shadow-lg">
                A
              </div>
              <div>
                <div className="font-bold text-slate-100 leading-none">Aura</div>
                <div className="text-xs text-slate-500 leading-none mt-0.5">监控面板</div>
              </div>
            </div>

            {/* 右侧状态区 */}
            <div className="flex items-center gap-4 text-sm">
              {/* SSE 连接状态 */}
              <div className={`flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full border ${
                connected
                  ? 'bg-green-500/10 border-green-500/30 text-green-400'
                  : 'bg-slate-800 border-slate-700 text-slate-500'
              }`}>
                <span className={`w-1.5 h-1.5 rounded-full ${connected ? 'bg-green-400 pulse-green' : 'bg-slate-500'}`} />
                {connected ? '实时' : '断开'}
              </div>

              {/* UP/DOWN 计数 */}
              <div className="flex items-center gap-3">
                <span className="flex items-center gap-1.5">
                  <span className="w-2 h-2 rounded-full bg-green-400 pulse-green" />
                  <span className="text-green-400 font-bold">{upCount}</span>
                  <span className="text-slate-500 text-xs">UP</span>
                </span>
                <span className="flex items-center gap-1.5">
                  <span className={`w-2 h-2 rounded-full ${downCount > 0 ? 'bg-red-400 pulse-red' : 'bg-slate-600'}`} />
                  <span className={`font-bold ${downCount > 0 ? 'text-red-400' : 'text-slate-500'}`}>{downCount}</span>
                  <span className="text-slate-500 text-xs">DOWN</span>
                </span>
              </div>

              {/* 更新时间 */}
              <span className="text-slate-600 text-xs hidden sm:block">更新于 {updateTime}</span>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">

            {/* 统计卡片 */}
            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 fade-in">
              <StatCard label="总探针" value={allProbes.length} icon="◎"
                color={{ bg: 'bg-slate-700/50', text: 'text-slate-100' }}
                sub={probes === null ? '加载中...' : `${upCount} 在线 · ${downCount} 离线`} />
              <StatCard label="在线" value={upCount} icon="✓"
                color={{ bg: 'bg-green-500/15', text: 'text-green-400' }} />
              <StatCard label="离线" value={downCount} icon="✕"
                color={{ bg: downCount > 0 ? 'bg-red-500/15' : 'bg-slate-700/50', text: downCount > 0 ? 'text-red-400' : 'text-slate-400' }} />
              <StatCard label="HTTP 探针" value={httpProbes.length} icon="⬡"
                color={{ bg: 'bg-violet-500/15', text: 'text-violet-400' }} />
              <StatCard label="Node 探针" value={nodeProbes.length} icon="▣"
                color={{ bg: 'bg-blue-500/15', text: 'text-blue-400' }} />
            </div>

            {/* 告警区域 */}
            {alerts && alerts.length > 0 && <AlertsPanel alerts={alerts} />}

            {/* Node 服务器表格 */}
            <section className="fade-in">
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-xs font-semibold text-slate-400 uppercase tracking-wider">
                  服务器节点
                </h2>
                {nodes && (
                  <span className="text-xs text-slate-600 bg-slate-800 px-2 py-0.5 rounded-full">
                    {nodes.length} 台
                  </span>
                )}
              </div>
              <div className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
                <NodeTable nodes={nodes} onSelect={setSelectedItem} />
              </div>
            </section>

            {/* HTTP 探针 */}
            {httpProbes.length > 0 && (
              <section className="fade-in">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-xs font-semibold text-slate-400 uppercase tracking-wider">
                    HTTP 探针
                  </h2>
                  <span className="text-xs text-slate-600 bg-slate-800 px-2 py-0.5 rounded-full">
                    {httpProbes.length} 个
                  </span>
                </div>
                <HttpProbeList probes={httpProbes} onSelect={setSelectedItem} />
              </section>
            )}

          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
