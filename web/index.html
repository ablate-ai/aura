<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>探针监控面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: { 950: '#0f172a' }
          }
        }
      }
    }
  </script>
  <style>
    .pulse-green { box-shadow: 0 0 8px #22c55e; }
    .pulse-red   { box-shadow: 0 0 8px #ef4444; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const API = '/api';

    function StatusDot({ status, size = 'sm' }) {
      const sz = size === 'sm' ? 'w-2 h-2' : 'w-3 h-3';
      return (
        <span className={`inline-block rounded-full flex-shrink-0 ${sz} ${
          status === 'up' ? 'bg-green-500 pulse-green' : 'bg-red-500 pulse-red'
        }`} />
      );
    }

    function AlertsPanel({ alerts }) {
      if (!alerts) return <div className="text-slate-500 text-center py-6">加载中...</div>;
      if (alerts.length === 0) return (
        <div className="text-green-400 text-center py-6 flex items-center justify-center gap-2">
          <StatusDot status="up" /> 所有探针运行正常
        </div>
      );
      return (
        <div className="space-y-2">
          {alerts.map((a, i) => (
            <div key={i} className="flex items-center gap-3 p-3 bg-red-500/10 border-l-4 border-red-500 rounded">
              <span className="text-xs font-bold bg-red-500 text-white px-2 py-0.5 rounded-full">DOWN</span>
              <div className="flex-1 min-w-0">
                <div className="font-semibold truncate">{a.name}</div>
                <div className="text-sm text-slate-400 truncate">{a.target}</div>
              </div>
              <div className="text-sm text-red-400 flex-shrink-0">{a.duration}</div>
            </div>
          ))}
        </div>
      );
    }

    function ProbeCard({ probe }) {
      return (
        <div className={`bg-slate-800 rounded-lg p-4 hover:-translate-y-0.5 transition-transform ${
          probe.status === 'down' ? 'border border-red-500' : ''
        }`}>
          <div className="flex items-center justify-between mb-3">
            <div className="font-semibold text-sm truncate flex-1 mr-2" title={probe.name}>{probe.name}</div>
            <StatusDot status={probe.status} />
          </div>
          <span className={`text-xs px-2 py-0.5 rounded ${
            probe.type === 'blackbox'
              ? 'bg-violet-500/20 text-violet-300'
              : 'bg-slate-700 text-slate-400'
          }`}>
            {probe.type === 'blackbox' ? 'HTTP' : 'Node'}
          </span>
          <div className="mt-3 text-xs text-slate-400 space-y-1">
            <div className="flex justify-between gap-2">
              <span>目标</span>
              <span className="truncate text-right max-w-[60%]">{probe.target}</span>
            </div>
            <div className="flex justify-between">
              <span>状态</span>
              <span className={probe.status === 'up' ? 'text-green-400' : 'text-red-400'}>
                {probe.status.toUpperCase()}
              </span>
            </div>
          </div>
        </div>
      );
    }

    function TrendChart({ hours }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        async function load() {
          try {
            const res = await fetch(`${API}/trend?hours=${hours}`);
            const result = await res.json();
            const step = 5 * 60 * 1000;
            const totalPoints = Math.ceil(hours * 60 / 5);
            const timeMap = new Map();

            result.data.forEach(series => {
              series.data.forEach(point => {
                const key = Math.floor(point.timestamp / 300) * 300;
                if (!timeMap.has(key)) timeMap.set(key, { up: 0, total: 0 });
                const s = timeMap.get(key);
                s.total++;
                if (point.value === 1) s.up++;
              });
            });

            const labels = [], data = [];
            const now = Date.now();
            for (let i = totalPoints - 1; i >= 0; i--) {
              const ts = now - i * step;
              const key = Math.floor(ts / 1000 / 300) * 300;
              const s = timeMap.get(key);
              labels.push(new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }));
              data.push(s ? (s.up / s.total * 100) : null);
            }

            if (chartRef.current) chartRef.current.destroy();
            chartRef.current = new Chart(canvasRef.current, {
              type: 'line',
              data: {
                labels,
                datasets: [{
                  label: '可用性 (%)',
                  data,
                  borderColor: '#22c55e',
                  backgroundColor: 'rgba(34,197,94,0.1)',
                  fill: true,
                  tension: 0.3,
                  pointRadius: 0,
                  pointHoverRadius: 5
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
                scales: {
                  x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', maxTicksLimit: 10 } },
                  y: { min: 0, max: 100, grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: v => v + '%' } }
                },
                interaction: { intersect: false, mode: 'index' }
              }
            });
          } catch (e) { console.error('加载趋势失败:', e); }
        }
        load();
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [hours]);

      return <canvas ref={canvasRef} />;
    }

    function App() {
      const [probes, setProbes] = useState(null);
      const [alerts, setAlerts] = useState(null);
      const [hours, setHours] = useState(1);
      const [updateTime, setUpdateTime] = useState('-');

      const loadAll = useCallback(async () => {
        try {
          const [pRes, aRes] = await Promise.all([
            fetch(`${API}/probes`),
            fetch(`${API}/alerts`)
          ]);
          const [p, a] = await Promise.all([pRes.json(), aRes.json()]);
          setProbes(p.data || []);
          setAlerts(a.data || []);
          setUpdateTime(new Date().toLocaleTimeString('zh-CN'));
        } catch (e) { console.error(e); }
      }, []);

      useEffect(() => {
        loadAll();
        const t = setInterval(loadAll, 30000);
        return () => clearInterval(t);
      }, [loadAll]);

      const up = probes ? probes.filter(p => p.status === 'up').length : 0;
      const down = probes ? probes.filter(p => p.status === 'down').length : 0;
      const HOURS = [{ label: '1小时', v: 1 }, { label: '6小时', v: 6 }, { label: '24小时', v: 24 }, { label: '7天', v: 168 }];

      return (
        <>
          <header className="bg-slate-800 border-b border-slate-700 px-6 py-4 flex flex-wrap gap-4 items-center justify-between">
            <h1 className="text-xl font-semibold">探针监控面板</h1>
            <div className="flex items-center gap-6">
              <div className="flex items-center gap-2">
                <StatusDot status="up" size="md" />
                <span className="text-sm">UP: {up}</span>
              </div>
              <div className="flex items-center gap-2">
                <StatusDot status="down" size="md" />
                <span className="text-sm">DOWN: {down}</span>
              </div>
              <span className="text-sm text-slate-400">更新于: {updateTime}</span>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
            <section>
              <h2 className="text-base font-semibold mb-3 text-slate-100">告警</h2>
              <div className="bg-slate-800 rounded-lg p-4">
                <AlertsPanel alerts={alerts} />
              </div>
            </section>

            <section>
              <h2 className="text-base font-semibold mb-3 text-slate-100">探针状态</h2>
              {!probes
                ? <div className="text-slate-500 text-center py-6">加载中...</div>
                : <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    {probes.map((p, i) => <ProbeCard key={i} probe={p} />)}
                  </div>
              }
            </section>

            <section>
              <h2 className="text-base font-semibold mb-3 text-slate-100">历史趋势</h2>
              <div className="bg-slate-800 rounded-lg p-4">
                <div className="flex gap-2 mb-4 flex-wrap">
                  {HOURS.map(h => (
                    <button key={h.v} onClick={() => setHours(h.v)}
                      className={`px-4 py-1.5 rounded text-sm border transition-colors ${
                        hours === h.v
                          ? 'bg-blue-600 border-blue-600 text-white'
                          : 'border-slate-600 text-slate-300 hover:bg-slate-700'
                      }`}>
                      {h.label}
                    </button>
                  ))}
                </div>
                <div className="h-72">
                  <TrendChart hours={hours} />
                </div>
              </div>
            </section>
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
  </script>
</body>
</html>
